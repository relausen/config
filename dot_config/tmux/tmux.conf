unbind C-b
set -g prefix C-a
set -sa terminal-overrides ",*:RGB"
set -g default-terminal "tmux-256color"
set -g mouse off
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 3
set -g history-limit 100000
set -g set-titles off
set -g set-titles-string "#{pane-title}"

set -s escape-time 1
set -s extended-keys on
set -s focus-events on

set-window-option -g mode-keys vi


bind Escape copy-mode
bind p paste-buffer
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded config"
bind -T copy-mode-vi v send -X begin-selection
# bind -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

unbind %
unbind \"
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

bind C-a send-prefix
bind C-j send-keys 'C-j'
bind C-k send-keys 'C-k'
bind C-l send-keys 'C-l'

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r m resize-pane -Z

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

source-file ~/.config/tmux/plugins/tokyonight.nvim/extras/tmux/tokyonight_night.tmux

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'folke/tokyonight.nvim'
set -g @plugin 'folke/tokyonight.nvim/extras/tmux/tokyonight_night.tmux'

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
